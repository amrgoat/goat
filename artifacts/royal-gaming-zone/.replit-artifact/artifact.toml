kind = "web"
previewPath = "/"
title = "Royal Gaming Zone"
version = "1.0.0"
id = "artifacts/royal-gaming-zone"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26077

[services.development]
run = "pnpm --filter @workspace/royal-gaming-zone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/royal-gaming-zone", "run", "build" ]
serve = "static"
publicDir = "artifacts/royal-gaming-zone/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26077"
BASE_PATH = "/"
